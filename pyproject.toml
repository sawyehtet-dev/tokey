[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "cc-token-tracker"
version = "0.1.0"
description = "Real-time per-prompt token cost for Claude Code."
requires-python = ">=3.11"
dependencies = ["rich>=13"]

[project.scripts]
cc-tracker = "cc_token_tracker.display:main"
cc-tracker-shim = "cc_token_tracker.shim:main"

[tool.setuptools.packages.find]
where = ["src"]
