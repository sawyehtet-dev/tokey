[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "tokey"
version = "0.3.0"
description = "Real-time per-prompt token cost for Claude Code."
requires-python = ">=3.11"
dependencies = ["rich>=13"]

[project.scripts]
tokey = "cc_token_tracker.display:main"

[tool.setuptools.packages.find]
where = ["src"]
